<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG Stage 0 - Todo Card</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="container">
        <article class="todo-card" data-testid="test-todo-card">

            <header class="todo-header">
                <h2 class="todo-title" data-testid="test-todo-title">
                    Complete HNG Stage 0 Task
                </h2>
                <span class="priority-badge" data-testid="test-todo-priority" aria-label="Priority: High">
                    High
                </span>
            </header>

            <p class="todo-description" data-testid="test-todo-description">
                Develop a responsive and accessible todo card using vanilla HTML, CSS, and JS. Ensure all data-testids
                are accurate for the auto-grader.
            </p>

            <div class="todo-meta">
                <div class="date-group">
                    <strong>Due:</strong>
                    <time id="due-date" data-testid="test-todo-due-date"  ">
                        Apr 18, 2026
                    </time>
                </div>

                <p class="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">
                    Calculating time...
                </p>
            </div>

            <ul class="tag-list" data-testid="test-todo-tags" role="list">
                <li class="tag-item" data-testid="test-todo-tag-work">Work</li>
                <li class="tag-item" data-testid="test-todo-tag-urgent">Urgent</li>
            </ul>

            <hr class="divider">

            <footer class="todo-footer">
                <div class="status-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="complete-checkbox" data-testid="test-todo-complete-toggle">
                        <span class="custom-checkbox"></span>
                        <span class="status-text" data-testid="test-todo-status">Pending</span>
                    </label>
                </div>

                <div class="action-buttons">
                    <button class="btn-edit" data-testid="test-todo-edit-button" aria-label="Edit Task">
                        Edit
                    </button>
                    <button class="btn-delete" data-testid="test-todo-delete-button" aria-label="Delete Task">
                        Delete
                    </button>
                </div>
            </footer>

        </article>
    </main>

    <script src="script.js"></script>
</body>

</html>
