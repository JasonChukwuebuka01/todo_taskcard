<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG Stage 1 - Interactive Todo Card</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="container">
        <article class="todo-card" data-testid="test-todo-card">

            <div id="todo-view-mode">
                <div class="priority-accent" data-testid="test-todo-priority-indicator"></div>

                <header class="todo-header">
                    <h2 class="todo-title" data-testid="test-todo-title">
                        Complete HNG Stage 1 Task
                    </h2>
                    <span class="priority-badge" data-testid="test-todo-priority">
                        High
                    </span>
                </header>

                <div id="todo-description-section" data-testid="test-todo-collapsible-section">
                    <p class="todo-description" data-testid="test-todo-description">
                        Develop a responsive and accessible todo card using vanilla HTML, CSS, and JS.
                        Ensure all data-testids are accurate for the auto-grader.
                    </p>
                </div>
                <button class="btn-expand" data-testid="test-todo-expand-toggle" aria-expanded="false"
                    aria-controls="todo-description-section">
                    Show More
                </button>

                <div class="todo-meta">
                    <div class="date-group">
                        <strong>Due:</strong>
                        <time id="due-date-display" data-testid="test-todo-due-date" datetime="2026-04-17T23:59:00">
                            Apr 17, 2026
                        </time>
                    </div>

                    <div class="time-status-wrapper">
                        <p class="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">
                            Calculating time...
                        </p>
                        <span id="overdue-badge" data-testid="test-todo-overdue-indicator"
                            style="display: none;">Overdue</span>
                    </div>
                </div>

                <ul class="tag-list" data-testid="test-todo-tags" role="list">
                    <li class="tag-item" data-testid="test-todo-tag-work">Work</li>
                    <li class="tag-item" data-testid="test-todo-tag-urgent">Urgent</li>
                </ul>

                <hr class="divider">

                <footer class="todo-footer">
                    <div class="status-group">
                        <label class="checkbox-container" for="complete-checkbox">
                            <input type="checkbox" id="complete-checkbox" data-testid="test-todo-complete-toggle">
                            <span class="status-text" data-testid="test-todo-status">Pending</span>
                        </label>

                        <select id="status-control" data-testid="test-todo-status-control" aria-label="Change Status">
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Done">Done</option>
                        </select>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-edit" id="edit-btn" data-testid="test-todo-edit-button"
                            aria-label="Edit Task">
                            Edit
                        </button>
                        <button class="btn-delete" data-testid="test-todo-delete-button" aria-label="Delete Task">
                            Delete
                        </button>
                    </div>
                </footer>
            </div>



            <form id="todo-edit-mode" data-testid="test-todo-edit-form">
                <h3>Edit Task</h3>

                <div class=" form-group">
                    <label for="edit-title">Title</label>
                    <input type="text" id="edit-title" data-testid="test-todo-edit-title-input">
                </div>

                <div class="form-group">
                    <label for="edit-description">Description</label>
                    <textarea id="edit-description" data-testid="test-todo-edit-description-input"></textarea>
                </div>

                <div class="form-group">
                    <label for="edit-priority">Priority</label>
                    <select id="edit-priority" data-testid="test-todo-edit-priority-select">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="edit-due-date">Due Date</label>
                    <input type="datetime-local" id="edit-due-date" data-testid="test-todo-edit-due-date-input">
                </div>

                <div class="edit-actions">
                    <button type="button" class="btn-save" id="save-btn"
                        data-testid="test-todo-save-button">Save</button>
                    <button type="button" class="btn-cancel" id="cancel-btn"
                        data-testid="test-todo-cancel-button">Cancel</button>
                </div>
            </form>

        </article>
    </main>

    <script src="script.js"></script>
</body>

</html>
